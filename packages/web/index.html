<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1f1e1d" />
    <meta name="description" content="Los vinos que probamos, y si nos gustaron." />
    <title>Wiki of Wine</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <!-- Anti-FOUC: aplica tema + acento antes de montar React. Mantener en sync con src/theme/accent.ts -->
    <script>
      (function () {
        try {
          var mode = localStorage.getItem('bv-theme');
          if (mode !== 'light' && mode !== 'dark') {
            mode = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', mode);
          var hex = localStorage.getItem('bv-accent') || '#C96442';
          var r = parseInt(hex.slice(1, 3), 16),
            g = parseInt(hex.slice(3, 5), 16),
            b = parseInt(hex.slice(5, 7), 16);
          var cl = function (n) { return Math.max(0, Math.min(255, Math.round(n))); };
          var hx = function (a) { return '#' + a.map(function (c) { return cl(c).toString(16).padStart(2, '0'); }).join(''); };
          var li = function (a) { return [r + (255 - r) * a, g + (255 - g) * a, b + (255 - b) * a]; };
          var da = function (a) { return [r * (1 - a), g * (1 - a), b * (1 - a)]; };
          var base = mode === 'dark' ? li(0.12) : [r, g, b];
          var strong = mode === 'dark' ? li(0.24) : da(0.14);
          var lum = function (c) {
            var f = function (x) { x /= 255; return x <= 0.03928 ? x / 12.92 : Math.pow((x + 0.055) / 1.055, 2.4); };
            return 0.2126 * f(c[0]) + 0.7152 * f(c[1]) + 0.0722 * f(c[2]);
          };
          var s = document.documentElement.style;
          s.setProperty('--primary', hx(base));
          s.setProperty('--primary-strong', hx(strong));
          s.setProperty('--primary-soft', 'rgba(' + cl(base[0]) + ',' + cl(base[1]) + ',' + cl(base[2]) + ',0.16)');
          s.setProperty('--on-primary', lum(base) > 0.45 ? '#10100f' : '#ffffff');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
